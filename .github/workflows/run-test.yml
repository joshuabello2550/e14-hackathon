name: Stagehand Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # Use a suitable version for your project

      - name: Install dependencies
        run: npm ci

      - name: Install Stagehand and its dependencies
        run: |
          # Install Stagehand; adjust if needed based on your package
          npm install @browserbasehq/stagehand --save-dev

      - name: Install Xvfb (for compatibility)
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Xvfb and Stagehand tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # Use the secret for the API Key
        run: |
          # Start Xvfb
          Xvfb :99 -ac &
          export DISPLAY=:99

          # Run the test script
          node testStagehand.js
